<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CameraKit</title>
  <desc id="desc">CameraKit banner with abstract camera and sync motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="0.5" stop-color="#123C69"/>
      <stop offset="1" stop-color="#1F6F8B"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#E6EEF7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2F7FF"/>
      <stop offset="1" stop-color="#9FC7EA"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#00111F" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <g opacity="0.2">
    <circle cx="140" cy="56" r="3" fill="#E6F3FF"/>
    <circle cx="214" cy="84" r="2" fill="#E6F3FF"/>
    <circle cx="1088" cy="256" r="3" fill="#E6F3FF"/>
    <circle cx="1024" cy="220" r="2" fill="#E6F3FF"/>
    <circle cx="940" cy="48" r="2" fill="#E6F3FF"/>
  </g>

  <g opacity="0.24" stroke="#D7EBFF" stroke-width="1.5">
    <path d="M72 252C176 192 250 168 376 156"/>
    <path d="M840 72C934 110 1030 150 1132 220"/>
    <path d="M286 70C392 120 456 154 520 220"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="76" y="78" width="310" height="170" rx="26" fill="#0D2138" stroke="#7FB5E6" stroke-opacity="0.5"/>
    <rect x="104" y="106" width="92" height="58" rx="10" fill="#113457"/>
    <circle cx="246" cy="163" r="62" fill="url(#glass)"/>
    <circle cx="246" cy="163" r="45" fill="#0D2A47" stroke="url(#ring)" stroke-width="8"/>
    <circle cx="246" cy="163" r="18" fill="#183E63"/>
    <circle cx="227" cy="145" r="9" fill="#D7EEFF" fill-opacity="0.88"/>
    <rect x="302" y="108" width="50" height="14" rx="7" fill="#74AEE0"/>
    <rect x="302" y="132" width="38" height="12" rx="6" fill="#4C87BC"/>
  </g>

  <g stroke="#D8EEFF" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <path d="M422 150H458"/>
    <path d="M468 150H504"/>
    <path d="M514 150H550"/>
    <path d="M560 150H596"/>
  </g>

  <g fill="#ECF6FF">
    <text x="420" y="142" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" letter-spacing="1">CameraKit</text>
    <text x="422" y="184" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="500" fill="#D3E9FC">CLI and Python toolkit for camera calibration and synchronized capture</text>
  </g>

  <g opacity="0.9" stroke="#CCEAFF" stroke-width="2.5">
    <circle cx="1032" cy="116" r="52" fill="#1C5B86" fill-opacity="0.28"/>
    <circle cx="1032" cy="116" r="30" fill="#80BCE5" fill-opacity="0.24"/>
    <path d="M994 193L956 230"/>
    <path d="M1070 193L1108 230"/>
  </g>
</svg>
